<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Speech to Text & Text to Speech</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f4f4f4;
    }
    button {
      padding: 10px 20px;
      margin: 10px 0;
      font-size: 16px;
      cursor: pointer;
    }
    textarea {
      width: 100%;
      height: 120px;
      font-size: 16px;
      padding: 10px;
    }
  </style>
</head>
<body>

  <h2>🎤 Speech to Text</h2>
  <button onclick="startSpeechToText()">Start Listening</button>
  <textarea id="output" placeholder="Speech will appear here..."></textarea>

  <h2>🔊 Text to Speech</h2>
  <button onclick="speakText()">Speak Text</button>

  <script>
    // ---------- SPEECH TO TEXT ----------
    const SpeechRecognition =
      window.SpeechRecognition || window.webkitSpeechRecognition;

    const recognition = new SpeechRecognition();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      document.getElementById("output").value = text;
    };

    recognition.onerror = (event) => {
      alert("Error occurred: " + event.error);
    };

    function startSpeechToText() {
      recognition.start();
    }

    // ---------- TEXT TO SPEECH ----------
    function speakText() {
      const text = document.getElementById("output").value;
      if (!text) return alert("Please enter text!");

      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = "en-US";
      speech.rate = 1;
      speech.pitch = 1;

      window.speechSynthesis.speak(speech);
    }
  </script>

</body>
</html>
